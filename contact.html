<!DOCTYPE html>
<html>
<head>
    <title>Contact Campus Bites | FPA Canteen Kyambogo University</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contact & Order</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="order">
        <h2>Place Your Order</h2>
        <form
        onsubmit="sendToWhatsApp();
        return false;">
        <input type="text"
        id="name" placeholder="Your Name" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <section id="item" required>
            <option value="">Select Item</option>
            <select>
            <option>Select Item</option>
            <option>Coffee</option>
            <option>Ice Cream</option>
            <option>Yogurt</option>
            <option>Juice</option>
        </select>
        </section>
        <input type="number" id="quantity" placeholder="quantity" required>
        <textarea  id="message" placeholder="Location / Message">
        </textarea>
        <button type="submit">Send Order</button>  
        </form>
    </section>
    <section class="contact">
        <h2>Visit Us Today</h2>
        <p>FPT Canteen, Kyambogo University</p>
        <p>Kampala, Uganda</p>
        <p>Call / WhatsApp: +256762363314</p>
        <p>Email.campusbites@email.com</p>
        <h3>Opening Hours</h3>
        <p>Monday - Saturday: 8:00 AM - 9:00 PM</p>
        <P><STrong>Enjoy the best bites right on campus!</STrong></P>
    </section>
    <section class="map">
        <h2>Find Us Here</h2>
                <iframe src="https://maps.google.com/maps?q=Kyambogo%20Univerty&t=&z=15&ie=UTF8&iwloc=&output=embed"width="100%" height="300"></iframe>
    </section>
    <script>
function sendToWhatsApp() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let item = document.getElementById("item").value;
    let quantity = document.getElementById("quantity").value;
    let message = document.getElementById("message").value;
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.push({
        name, phone, item, quantity, message
    });

    localStorage.setItem("orders", JSON.stringify(orders));
    let url = "https://wa.me/256762363314?text="
        + "New Order:%0a"
        + "Name: " + name + "%0a"
        + "Item: " + item + "%0a"
        + "Quantity: " + quantity;

    window.open(url, "_blank");
}
</script>

    
</body>
</html>
